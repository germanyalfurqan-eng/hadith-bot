<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>📖 Штудирование хадисов — живой журнал выверки</title>
<style>
:root{--bg:#0f1420;--card:#19202e;--bd:#2a3548;--tx:#e8eef7;--mut:#8da0bb;--ok:#37d67a;--warn:#ffb454;--bad:#ff6b6b;--ar:#ffe9b0;--blue:#54a0ff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px}
header{position:sticky;top:0;background:#121826;border-bottom:1px solid var(--bd);padding:9px 12px;z-index:5}
h1{margin:0 0 5px;font-size:15px}
.stats{display:flex;gap:6px;flex-wrap:wrap;font-size:12px}
.pill{background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:3px 9px}
.pill b{color:var(--ok)}
main{padding:8px;max-width:860px;margin:0 auto}
.row{background:var(--card);border:1px solid var(--bd);border-radius:10px;margin:6px 0;padding:8px 10px}
.head{display:flex;align-items:center;gap:7px;cursor:pointer;flex-wrap:wrap}
.num{background:#243049;border-radius:6px;padding:2px 8px;font-weight:700;font-size:13px;white-space:nowrap}
.code{background:#1c3a2a;border:1px solid #2f6b46;color:#7df0a8;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;font-family:monospace;cursor:pointer}
.vd{font-size:12px;color:var(--mut);flex:1;min-width:120px}
.vd .v{color:var(--ok)} .vd .b{color:var(--bad)}
.hukm{color:var(--ok);font-size:12px}
.matn{direction:rtl;text-align:right;font-size:16px;color:var(--ar);margin:6px 0;line-height:1.8;font-family:'Traditional Arabic','Scheherazade',serif}
.full{direction:rtl;text-align:right;font-size:16px;color:#e7eefb;background:#0d1622;border:1px solid #233;border-radius:8px;padding:8px 10px;margin:5px 0;line-height:2;font-family:'Traditional Arabic',serif}
.det{display:none;margin-top:6px;border-top:1px dashed var(--bd);padding-top:7px}
.det.open{display:block}
.lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-top:6px}
.tag{display:inline-block;border:1px solid var(--bd);border-radius:6px;padding:2px 7px;margin:2px;font-size:12px;cursor:pointer;background:#1d2636}
.tag.self{border-color:var(--blue);color:var(--blue)}
.tag.add{border-color:#2f6b46}
.tag .c{color:#7df0a8;font-family:monospace;font-size:11px}
.tag.sg{border-color:#7a5a23;color:var(--warn)}
.nr{display:inline-block;border:1px solid #3a4a63;border-radius:14px;padding:2px 9px;margin:2px;font-size:13px;cursor:pointer;background:#1a2740;color:#cfe1ff;direction:rtl}
.nr.au{border-color:var(--ok);color:#aef5c8}
.tahrij{direction:rtl;text-align:right;font-size:13px;color:#cfe;background:#10221a;border:1px solid #244;border-radius:7px;padding:5px 8px;margin:3px 0;line-height:1.7}
.ref{font-size:11px;color:var(--mut);text-align:center;margin:8px 0}
input{background:#0c111b;color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:13px;width:140px}
button{background:#243049;color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:20;display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sheet{background:#161d2b;border:1px solid var(--bd);border-radius:14px 14px 0 0;width:100%;max-width:860px;max-height:82vh;overflow:auto;padding:14px}
.sheet h3{margin:0 0 8px;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.sheet .x{cursor:pointer;color:var(--mut);font-size:20px;padding:0 6px}
.kv{font-size:13px;margin:3px 0} .kv b{color:var(--mut);font-weight:500}
.jarh{direction:rtl;text-align:right;font-size:14px;color:#dfe;line-height:1.9;margin-top:6px;border-top:1px solid var(--bd);padding-top:6px}
</style>
</head>
<body>
<header>
  <h1>📖 Штудирование хадисов <span style="color:var(--mut);font-size:12px">M499 · жми хадис</span></h1>
  <div class="stats" id="stats">загрузка…</div>
  <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
    <input id="q" placeholder="№ или слово…" oninput="render()">
    <button onclick="reload()">⟳</button>
    <label style="font-size:12px;color:var(--mut)"><input type="checkbox" id="auto" style="width:auto"> авто 30с</label>
  </div>
</header>
<main id="list"></main>
<div class="ov" id="ov" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<script>
let DATA=[], BYP={}, META={txt_bucket:500,chain_prefix:3}, NARR=null;
const cache={};
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function jget(u){ if(cache[u]!==undefined)return cache[u]; try{const r=await fetch(u);cache[u]=r.ok?await r.json():null}catch(e){cache[u]=null} return cache[u]; }
function shardOf(place){const [b,n]=place.split('|');return b+'_'+Math.floor(parseInt(n)/META.txt_bucket);}
async function loadTxt(place){const o=await jget('sift/txt/'+shardOf(place)+'.json');return o?o[place]:null;}
async function loadEsn(place){const o=await jget('sift/esn/'+shardOf(place)+'.json');return o?o[place]:null;}
async function loadNarr(){if(!NARR)NARR=await jget('sift/narr.json');return NARR||{};}
async function loadChain(cc){const o=await jget('sift/chain_'+cc.slice(0,3)+'.json');return o?o[cc]:null;}
function coll(place){const b=place.split('|')[0];const M={'1681':'Бухари','711':'Муслим','1727':'Муслим','654':'Абу Дауд','1726':'Абу Дауд','7895':'Тирмизи','1435':'Тирмизи','829':'Насаи','8361':'Насаи-Кубра','1198':'Ибн Маджа','25794':'Ахмад','98139':'Ахмад','28107':'Малик','1456':'Тайалиси','537':'Ибн Хиббан','1446':'Ибн Хузайма','21795':'Дарими','1733':'Табарани','12520':'Абу Яʿля','12981':'Баззар','1424':'Хаким','9944':'Ибн Аби Шейба'};return M[b]||b;}
function placeLabel(place){return coll(place)+' '+place.split('|')[1];}

function openSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('ov').classList.add('show');}
function closeSheet(){document.getElementById('ov').classList.remove('show');}

async function showNarr(id){
  const N=await loadNarr(); const r=N[id];
  let h='<h3><span>Передатчик · id '+id+'</span><span class="x" onclick="closeSheet()">✕</span></h3>';
  if(!r){h+='<div class="kv" style="color:var(--warn)">Нет в موسوعة الرواة — это «свой id» (создан нами)</div>';}
  else{
    h+='<div class="matn" style="font-size:18px">'+esc(r[0])+'</div>';
    if(r[1])h+='<div class="kv"><b>кунья:</b> <span style="direction:rtl">'+esc(r[1])+'</span></div>';
    if(r[2])h+='<div class="kv"><b>нисба:</b> <span style="direction:rtl">'+esc(r[2])+'</span></div>';
    if(r[3])h+='<div class="kv"><b>умер:</b> '+esc(''+r[3])+' г.х.</div>';
    if(r[4])h+='<div class="kv"><b>ранг:</b> <span style="color:var(--ok);direction:rtl">'+esc(r[4])+'</span></div>';
    if(r[5])h+='<div class="jarh">'+esc(r[5])+'…</div>';
  }
  openSheet(h);
}
async function showChain(cc){
  const c=await loadChain(cc);
  const N=await loadNarr();
  let h='<h3><span>Код цепи '+esc(cc)+'</span><span class="x" onclick="closeSheet()">✕</span></h3>';
  if(c&&c.seq){h+='<div class="lbl">Цепь (снизу-вверх):</div><div>'+c.seq.map((id,i)=>'<span class="nr'+(i===c.seq.length-1?' au':'')+'" onclick="showNarr(\''+id+'\')">'+esc((N[id]&&N[id][0]||('#'+id)).slice(0,22))+'</span>').join(' ← ')+'</div>';}
  const pls=(c&&c.pl)||[];
  h+='<div class="lbl">Хадисы с ЭТОЙ ЖЕ цепью ('+pls.length+'):</div><div>';
  h+=pls.map(p=>'<span class="tag" onclick="openHadith(\''+p+'\')">'+esc(placeLabel(p))+'</span>').join('');
  h+='</div>'+(pls.length<2?'<div class="ref">эта цепь встречается только здесь</div>':'');
  openSheet(h);
}
async function openHadith(place,ctxCode){
  const txt=await loadTxt(place);
  const ids=await loadEsn(place);
  const N=await loadNarr();
  const e=BYP[place];
  const code=ctxCode||(e&&e.code)||'';
  let h='<h3><span>'+esc(placeLabel(place))+(code?' · <span style="color:#7df0a8;font-family:monospace">'+esc(code)+'</span>':'')+'</span><span class="x" onclick="closeSheet()">✕</span></h3>';
  h+='<div class="full">'+esc(txt||'(текст недоступен)')+'</div>';
  if(ids&&ids.length){
    h+='<div class="lbl">Передатчики (жми):</div><div>'+ids.map((id,i)=>'<span class="nr'+(i===ids.length-1?' au':'')+'" onclick="showNarr(\''+id+'\')">'+esc((N[id]&&N[id][0]||('#'+id)).slice(0,22))+'</span>'+(i===ids.length-1?' <small style="color:var(--mut)">(автор)</small>':(i===0?' <small style="color:var(--mut)">(сахаби)</small>':''))).join(' ← ')+'</div>';
  }
  openSheet(h);
}

function chainNamesHtml(e){
  if(!e.chain_ids||!e.chain_ids.length) return (e.chain&&e.chain.length)? e.chain.map((n,i)=>'<span class="nr'+(i===e.chain.length-1?' au':'')+'">'+esc(n)+'</span>').join(' ← ') : '<span style="color:var(--mut)">цепь не найдена</span>';
  return e.chain_ids.map((id,i)=>{
    const nm=(e.chain&&e.chain[i])||('#'+id);
    const role=i===0?' <small style="color:var(--mut)">(сахаби)</small>':(i===e.chain_ids.length-1?' <small style="color:var(--mut)">(автор)</small>':'');
    return '<span class="nr'+(i===e.chain_ids.length-1?' au':'')+'" onclick="showNarr(\''+id+'\')">'+esc(nm)+'</span>'+role;
  }).join(' ← ');
}
async function expandRow(e,det){
  if(det.dataset.loaded){det.classList.toggle('open');return;}
  det.dataset.loaded='1';
  const txt=await loadTxt(e.place);
  let h='';
  h+='<div class="full">'+esc(txt||e.matn)+'</div>';
  h+='<div class="lbl">Цепь — жми передатчика (карточка из موسوعة):</div><div>'+chainNamesHtml(e)+'</div>';
  if(e.ccode)h+='<div class="lbl">Код цепи:</div><span class="code" onclick="showChain(\''+e.ccode+'\')">'+esc(e.ccode)+' ↗ где ещё эта цепь</span>';
  if(e.tahrij&&e.tahrij.length)h+='<div class="lbl">✅ Одобренный тахридж (по чему слил):</div>'+e.tahrij.map(t=>'<div class="tahrij">'+esc(t)+'</div>').join('');
  h+='<div class="lbl">Семья — версия V · путь P (жми, чтобы открыть):</div><div>'+
     (e.fam_codes||[]).map(fc=>{const p=fc[0],code=fc[1]||'',src=fc[2]||'';const self=p===e.place;
       return '<span class="tag'+(self?' self':'')+(src==='текст'?' add':'')+'" onclick="openHadith(\''+p+'\',\''+code+'\')">'+esc(placeLabel(p))+' <span class="c">'+esc(code)+'</span>'+(src==='текст'?' <small style="color:#7df0a8">+текст</small>':'')+'</span>';}).join('')+'</div>';
  if(e.suggest&&e.suggest.length)h+='<div class="lbl">⚠ Возможно сюда же (на МОЁ подтверждение):</div><div>'+
     e.suggest.map(s=>'<span class="tag sg" onclick="openHadith(\''+s[0]+'\')">'+esc(placeLabel(s[0]))+' · '+(s[2]==='цепь'?'та же цепь':'текст '+Math.round(s[3]*100)+'%')+'</span>').join('')+'</div>';
  det.innerHTML=h; det.classList.add('open');
}

function reload(){ fetch('sift_log.json?_='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;BYP={};d.forEach(e=>BYP[e.place]=e);render()}).catch(()=>{document.getElementById('stats').textContent='нет данных'}); }
function render(){
  const q=(document.getElementById('q').value||'').trim();
  let rows=DATA;
  if(q)rows=DATA.filter(e=>(''+e.n).includes(q)||(e.matn||'').includes(q)||(e.code||'').includes(q));
  const susp=DATA.filter(e=>e.suspect).length, fam=DATA.filter(e=>e.versions>1&&!e.suspect).length, single=DATA.filter(e=>e.versions<=1).length;
  document.getElementById('stats').innerHTML=
    '<span class="pill">разобрано <b>'+DATA.length+'</b></span>'+
    '<span class="pill">чистых семей <b>'+fam+'</b></span>'+
    '<span class="pill">одиночек '+single+'</span>'+
    '<span class="pill">⚠ крупных <span style="color:var(--bad)">'+susp+'</span></span>';
  const all=rows.slice().reverse(), shown=all.slice(0,250);
  const L=document.getElementById('list');
  L.innerHTML=(all.length>250?'<div class="ref">показаны последние 250 из '+all.length+' — ищи по № выше</div>':'')+
   shown.map((e,i)=>{
     const idx=DATA.indexOf(e);
     const vc=e.suspect?'b':(e.versions>1?'v':'');
     return '<div class="row"'+(e.suspect?' style="border-color:var(--bad)"':'')+'>'+
       '<div class="head" onclick="expandRow(DATA['+idx+'],this.parentNode.querySelector(\'.det\'))">'+
         '<span class="num">'+esc(e.book)+' '+e.n+'</span>'+
         (e.code?'<span class="code">'+esc(e.code)+'</span>':'')+
         '<span class="vd '+vc+'">'+esc(e.verdict)+'</span>'+
         (e.hukm?'<span class="hukm">'+esc(e.hukm)+'</span>':'')+
       '</div>'+
       '<div class="matn">'+esc(e.matn)+'…</div>'+
       '<div class="det"></div>'+
     '</div>';
   }).join('');
}
(async()=>{ META=(await jget('sift/meta.json'))||META; reload(); })();
setInterval(()=>{if(document.getElementById('auto').checked)reload();},30000);
</script>
</body>
</html>
